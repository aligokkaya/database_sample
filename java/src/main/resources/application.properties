spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT
app.jwt.secret=${JWT_SECRET_KEY}
app.jwt.expiry-hours=${JWT_EXPIRY_HOURS:24}

# Auth
app.auth.username=${BASIC_AUTH_USERNAME}
app.auth.password=${BASIC_AUTH_PASSWORD}

# Encryption
app.encryption.key=${ENCRYPTION_KEY}

# LLM
app.llm.base-url=${OPENAI_BASE_URL}
app.llm.api-key=${OPENAI_API_KEY:ollama}
app.llm.model=${OPENAI_MODEL:llama3.2:latest}

server.port=8080

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

logging.level.com.kafein.discovery=INFO
